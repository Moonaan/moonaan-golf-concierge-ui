<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta -->
    <title>Missouri Golf Trail — AI Golf Concierge</title>
    <meta name="description" content="Book tee times across Missouri's finest golf courses with your voice or online. AI-powered concierge for the Missouri Golf Trail — one voice, every course, zero friction." />
    <meta name="keywords" content="Missouri golf, golf trail, tee times, Branson golf, Lake of the Ozarks golf, Kansas City golf, St. Louis golf, AI golf booking, voice booking, golf concierge" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Missouri Golf Trail — AI Golf Concierge" />
    <meta property="og:description" content="One Voice. Every Course. Zero Friction. Book tee times across 100+ Missouri courses with AI-powered voice or online booking." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://mogolftrail.com" />
    <meta property="og:site_name" content="Missouri Golf Trail" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Missouri Golf Trail — AI Golf Concierge" />
    <meta name="twitter:description" content="Book tee times with your voice. AI-powered golf concierge for Missouri's finest courses." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://mogolftrail.com" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "Missouri Golf Trail — AI Golf Concierge",
      "description": "AI-powered golf booking concierge for Missouri's finest courses. Book tee times by voice or online.",
      "url": "https://mogolftrail.com",
      "telephone": "+18336484653",
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "MO",
        "addressCountry": "US"
      },
      "areaServed": {
        "@type": "State",
        "name": "Missouri"
      },
      "priceRange": "$35-$375",
      "openingHours": "Mo-Su 06:00-20:00"
    }
    </script>

    <!-- Theme color -->
    <meta name="theme-color" content="#1B4D3E" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body class="min-h-screen bg-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
